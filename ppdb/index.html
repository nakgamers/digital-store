<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard PPDB SMK 11 Maret Jakarta</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<header>

    <div class="header-content">

        <img src="assets/img/logo.png" class="logo" alt="Logo SMK 11 Maret Jakarta">

        <div>

            <h1>Dashboard PPDB</h1>

            <h2>SMK 11 MARET JAKARTA</h2>

            <p>Tahun Ajaran 2026 / 2027</p>

        </div>

    </div>

</header>

<main>

    <div class="cards">

        <div class="card total">

            <div>
                <span>Total Pendaftar</span>
                <h1 id="total">0</h1>
            </div>

            <div class="icon" aria-hidden="true">
                &#127891;
            </div>

        </div>

        <div class="card laki">

            <div>
                <span>Laki-Laki</span>
                <h1 id="laki">0</h1>
            </div>

            <div class="icon" aria-hidden="true">
                &#128102;
            </div>

        </div>

        <div class="card perempuan">

            <div>
                <span>Perempuan</span>
                <h1 id="perempuan">0</h1>
            </div>

            <div class="icon" aria-hidden="true">
                &#128103;
            </div>

        </div>

    </div>

    <div class="charts">

        <div class="box">

            <h3>Komposisi Gender</h3>

            <canvas id="genderChart"></canvas>

        </div>

        <div class="box">

            <h3>Pendaftar per Jurusan</h3>

            <div id="jurusanCards"></div>

        </div>

    </div>

</main>

<section class="floating-formulir" id="formulirKeluarWidget">

    <div class="formulir-panel" id="formulirKeluarPanel" hidden>

        <div class="formulir-panel-header">

            <div>
                <span>Formulir Keluar</span>
                <strong id="formulirKeluarTotal">0</strong>
            </div>

            <button type="button" id="formulirKeluarClose" aria-label="Tutup formulir keluar">
                &times;
            </button>

        </div>

        <p id="formulirKeluarStatus">
            Mengambil data...
        </p>

    </div>

    <button type="button" class="formulir-toggle" id="formulirKeluarToggle" aria-label="Buka formulir keluar" aria-expanded="false">
        <span aria-hidden="true">&#128196;</span>
        <strong id="formulirKeluarBadge">0</strong>
    </button>

</section>

<footer>

    <p>
        &copy; 2026 SMK 11 Maret Jakarta
    </p>

    <p>
        Created by Nandz
    </p>

</footer>

<script src="app.js"></script>

</body>
</html>
